      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');

            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};

    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');

    }

amily: var(--font-serif);\n    font-style: italic;\n    font-weight: 400;\n    font-size: 24px;\n    line-height: 1;\n    color: var(--maroon);\n    letter-spacing: -0.01em;\n  }\n  .card__num::after {\n    content: \"\";\n    display: block;\n    width: 16px;\n    height: 2px;\n    background: var(--maroon);\n    margin-top: 5px;\n  }\n  .card__title {\n    font-family: var(--font-sans);\n    font-weight: 600;\n    font-size: 17px;\n    line-height: 1.4;\n    color: var(--ink);\n    margin: 0 0 10px;\n    letter-spacing: -0.005em;\n  }\n  .card__summary {\n    font-size: 13.5px;\n    line-height: 1.7;\n    color: rgba(0, 0, 0, 0.72);\n    margin: 0;\n    text-wrap: pretty;\n  }\n  .card__meta {\n    margin-top: auto;\n    padding-top: 14px;\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    font-family: var(--font-mono);\n    font-size: 10.5px;\n    letter-spacing: 0.1em;\n    color: rgba(0, 0, 0, 0.55);\n    text-transform: uppercase;\n  }\n  .card__chev {\n    width: 14px; height: 14px;\n    display: inline-block;\n    transition: transform 200ms var(--ease);\n  }\n  .card:hover .card__chev { transform: translateX(3px); }\n\n  /* =========================================================\n     Focused mode: scrim, fly target, explanation\n     ========================================================= */\n  .scrim {\n    position: fixed;\n    inset: 0;\n    background: rgba(0, 0, 0, 0.55);\n    opacity: 0;\n    pointer-events: none;\n    transition: opacity var(--t-overlay) var(--ease);\n    z-index: 50;\n  }\n  .scrim.is-on { opacity: 1; pointer-events: auto; }\n\n  .card.is-active {\n    position: fixed;\n    z-index: 100;\n    cursor: default;\n    box-shadow: var(--shadow-focus);\n    border-color: var(--maroon-line);\n    transition:\n      top    var(--t-fly) var(--ease),\n      left   var(--t-fly) var(--ease),\n      width  var(--t-fly) var(--ease),\n      height var(--t-fly) var(--ease),\n      border-radius var(--t-fly) dth: thin;\n    scrollbar-color: rgba(140, 29, 64, 0.3) transparent;\n  }\n  .full__body::-webkit-scrollbar { width: 8px; }\n  .full__body::-webkit-scrollbar-thumb { background: rgba(140, 29, 64, 0.3); border-radius: 4px; }\n\n  .full__body p {\n    margin: 0 0 12px;\n    font-size: 14.5px;\n    line-height: 1.85;\n    color: var(--ink);\n    text-wrap: pretty;\n  }\n  .full__body p.lead {\n    font-size: 15px;\n    color: var(--ink);\n    margin-bottom: 14px;\n  }\n  .full__body em.hl {\n    font-style: normal;\n    background: linear-gradient(transparent 62%, rgba(140, 29, 64, 0.22) 62%);\n    padding: 0 1px;\n  }\n  .full__body strong { color: var(--maroon); font-weight: 600; }\n  .full__body ul, .full__body ol {\n    margin: 0 0 14px;\n    padding-left: 22px;\n  }\n  .full__body ul li, .full__body ol li {\n    margin-bottom: 7px;\n    font-size: 14.5px;\n    line-height: 1.8;\n    color: var(--ink);\n  }\n  .full__body ul ul, .full__body ol ul {\n    margin-top: 6px;\n    margin-bottom: 6px;\n  }\n  .full__body ul ul li { font-size: 14px; color: var(--ink-2); }\n\n  /* Subsection headers (3.1, 3.2 ...) inside the requirements panel */\n  .full__body h3.subhead {\n    font-family: var(--font-sans);\n    font-weight: 600;\n    font-size: 15.5px;\n    color: var(--ink);\n    margin: 22px 0 10px;\n    padding: 6px 0 6px 12px;\n    border-left: 3px solid var(--maroon);\n    line-height: 1.45;\n    letter-spacing: -0.005em;\n  }\n  .full__body h3.subhead:first-child { margin-top: 0; }\n  .full__body h3.subhead .num {\n    font-family: var(--font-mono);\n    font-style: normal;\n    font-size: 12px;\n    color: var(--maroon);\n    margin-right: 8px;\n    letter-spacing: 0.08em;\n  }\n\n  .full__body .callout {\n    margin: 14px 0 6px;\n    padding: 12px 14px;\n    background: var(--maroon-soft);\n    border-left: 3px solid var(--maroon);\n    border-radius: 4px;\n    font-size: 14px;\n    line-height: 1.7;\n    color: var(--ink);\n  }\n  .full__body .callout b { color:     letter-spacing: -0.005em;\n  }\n  .explain__kicker {\n    font-family: var(--font-serif);\n    font-style: italic;\n    font-size: 13.5px;\n    color: var(--gray);\n    margin: 6px 0 0;\n  }\n\n  .explain__body {\n    padding: 18px 32px 28px;\n    overflow-y: auto;\n    flex: 1 1 auto;\n    min-height: 0;\n    scrollbar-width: thin;\n    scrollbar-color: #E0E0E0 transparent;\n  }\n  .explain__body::-webkit-scrollbar { width: 8px; }\n  .explain__body::-webkit-scrollbar-thumb { background: #E0E0E0; border-radius: 4px; }\n\n  .explain__body p {\n    margin: 0 0 14px;\n    font-size: 14.5px;\n    line-height: 1.9;\n    color: var(--ink);\n    text-wrap: pretty;\n  }\n  .explain__body .pull {\n    margin: 18px 0;\n    padding: 12px 18px;\n    border-left: 3px solid var(--gold);\n    background: #FFFBF0;\n    border-radius: 0 4px 4px 0;\n    font-family: var(--font-serif);\n    font-style: italic;\n    font-size: 15.5px;\n    line-height: 1.6;\n    color: var(--ink);\n  }\n  .explain__body h3.subhead {\n    font-family: var(--font-sans);\n    font-weight: 600;\n    font-size: 15.5px;\n    color: var(--ink);\n    margin: 24px 0 10px;\n    padding: 6px 0 6px 12px;\n    border-left: 3px solid var(--maroon);\n    line-height: 1.45;\n  }\n  .explain__body h3.subhead:first-child { margin-top: 0; }\n  .explain__body h3.subhead .num {\n    font-family: var(--font-mono);\n    font-style: normal;\n    font-size: 12px;\n    color: var(--maroon);\n    margin-right: 8px;\n    letter-spacing: 0.08em;\n  }\n  .explain__body ul, .explain__body ol {\n    margin: 0 0 14px;\n    padding-left: 22px;\n  }\n  .explain__body ul li, .explain__body ol li {\n    margin-bottom: 6px;\n    font-size: 14.5px;\n    line-height: 1.85;\n    color: var(--ink);\n  }\n  .explain__body strong { color: var(--maroon); font-weight: 600; }\n\n  /* Close button */\n  .close-btn {\n    appearance: none;\n    border: 1px solid #EBEBEB;\n    background: var(--white);\n    width: 34px; height: 34px;\n    border-radius: 50%;\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    cursor: pointer;\n    color: var(--maroon);\n    transition: all 160ms var(--ease);\n    flex: 0 0 auto;\n  }\n  .close-btn:hover {\n    background: var(--maroon);\n    color: var(--white);\n    border-color: var(--maroon);\n  }\n  .close-btn svg { width: 13px; height: 13px; }\n\n  /* =========================================================\n     Footer\n     ========================================================= */\n  .footer {\n    flex: 0 0 auto;\n    padding-top: 12px;\n    border-top: 1px solid rgba(255, 255, 255, 0.18);\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 16px;\n    flex-wrap: wrap;\n    font-family: var(--font-mono);\n    font-size: 10.5px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: rgba(255, 255, 255, 0.75);\n  }\n  .footer__brand { display: inline-flex; align-items: center; gap: 10px; }\n  .footer__brand .bar { width: 22px; height: 2px; background: var(--gold); display: inline-block; }\n  .footer__brand .bar.gold { background: var(--white); width: 8px; }\n\n  /* =========================================================\n     Tablet\n     ========================================================= */\n  @media (max-width: 1100px) {\n    .page { padding: 24px 32px 22px; }\n    .grid > .card:nth-child(-n+4) { grid-column: span 6; }\n    .grid > .card:nth-child(n+5)  { grid-column: span 4; }\n    .grid { grid-template-rows: auto; }\n    body { overflow: auto; }\n    .page { height: auto; min-height: 100vh; }\n    .masthead { grid-template-columns: 1fr; }\n    .masthead__right { grid-column: 1; grid-row: 2; max-width: none; }\n  }\n\n  /* =========================================================\n     Mobile (≤ 768px) — bottom-sheet mode\n     ========================================================= */\n  @media (max-width: 768px) {\n    body { overflow: auto; }\n    .page {\n      height: auto;\n      min-height: 100vh;\n      padding: 28px 18px 56px;\n      gap: 18px;\n    }\n    .masthead { padding-bottom: 18px; grid-template-columns: 1fr; }\n    .masthead__right { grid-column: 1; grid-row: 2; max-width: none; }\n    .masthead__title { font-size: 28px; }\n\n    .grid {\n      grid-template-columns: 1fr;\n      grid-template-rows: none;\n      gap: 12px;\n    }\n    .grid > .card:nth-child(-n+4),\n    .grid > .card:nth-child(n+5) { grid-column: span 1; }\n    .card { padding: 18px 20px 18px; }\n\n    .grid-head__hint .kbd-desktop { display: none; }\n\n    /* Bottom sheet for focused card */\n    .card.is-active {\n      position: fixed;\n      top: auto !important;\n      left: 0 !important;\n      right: 0;\n      bottom: 0 !important;\n      width: 100% !important;\n      height: 92vh !important;\n      border-radius: 18px 18px 0 0;\n      border-bottom: none;\n      transition:\n        transform var(--t-fly) var(--ease),\n        opacity   var(--t-fly) var(--ease);\n      transform: translateY(0) !important;\n      box-shadow: 0 -12px 40px rgba(26, 26, 26, 0.20);\n    }\n    .card.is-active.is-entering { transform: translateY(100%) !important; }\n\n    .explain {\n      position: static;\n      box-shadow: none;\n      border: none;\n      border-radius: 0;\n      border-top: 1px solid var(--line);\n      transform: none !important;\n      opacity: 1 !important;\n      pointer-events: auto !important;\n      width: 100%;\n    }\n    .explain__head { padding: 22px 22px 14px; background: var(--white); }\n    .explain__body { padding: 14px 22px 28px; }\n\n    .full__head { padding: 18px 22px 14px; }\n    .full__num { font-size: 28px; }\n    .full__title { font-size: 19px; }\n    .full__body { padding: 14px 22px 22px; }\n\n    .card.is-active .card__full {\n      overflow-y: auto;\n      -webkit-overflow-scrolling: touch;\n    }\n    .card.is-active .full__body { overflow: visible; }\n\n    .sheet-grab {\n      display: block;\n      width: 44px; height: 4px;\n      background: #d8d2c4;\n      border-radius: 2px;\n      margin: 10px auto 4px;\n    }\n  }\n  @media (min-width: 769px) {\n    .sheet-grab { display: none; }\n  }\n\n  /* Reduced motion */\n  @media (prefers-reduced-motion: reduce) {\n    *, *::before, *::after {\n      transition-duration: 1ms !important;\n      animation-duration: 1ms !important;\n    }\n  }\n\n  /* Style-overrides slot (preserved across direct edits) */\n<\u002Fstyle>\n<style id=\"__om-edit-overrides\"><\u002Fstyle>\n<\u002Fhead>\n<body data-screen-label=\"Assignment Overview\">\n\n<main class=\"page\">\n\n  <!-- ========== Masthead (compact, two-column) ========== -->\n  <header class=\"masthead\">\n    <div class=\"masthead__left\">\n      <p class=\"masthead__tag\">Arizona State University · PSY 553 顶点课程<\u002Fp>\n      <h1 class=\"masthead__title\">学术文献阅读笔记作业要求<\u002Fh1>\n      <p class=\"masthead__sub\">AI Facilitated Critical Reading Reflection<\u002Fp>\n    <\u002Fdiv>\n    <p class=\"masthead__right masthead__lede\" style=\"font-weight: 400;\">AI 时代对教育产生了巨大的冲击，作为教育者，我们需要重新理解教育评估的形式及其有效性。\n\n这对教师的影响是：作业形式的设置变得更为复杂，因为我们需要改变固有的传统模式。对学生而言，同样需要适应这种新的模式。\n\nAI 时代对教育产生了巨大的冲击，作为教育者，我们需要重新理解教育评估的形式及其有效性。\n\n初期大家可能会觉得流程比较繁琐，这是因为我们所有人都在适应一种新的工作和学习方式，开始时会感到困难。希望随着课程的进展与磨合，整个过程会变得更为简便，同学们也能逐渐适应。<\u002Fp>\n    <span class=\"masthead__rule\" aria-hidden=\"true\"><\u002Fspan>\n  <\u002Fheader>\n\n  <!-- ========== Grid heading ========== -->\n  <div class=\"grid-head\">\n    <span class=\"grid-head__label\">作业要求 · 共 7 节<\u002Fspan>\n    <span class=\"grid-head__hint\">\n      <span class=\"kbd-desktop\">点击任意卡片查看详情 · 按 <span class=\"kbd\">Esc<\u002Fspan> 关闭<\u002Fspan>\n      <span class=\"kbd-mobile\" style=\"display:none;\">点击卡片查看详情<\u002Fspan>\n    <\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ========== Card grid (4 + 3 layout) ==========\n       Open/close behaviour is shared. Each card has:\n         .card__compact  — visible in grid view\n         .card__full     — visible when the card is focused\n       Add or edit cards in place; the JS reads data-section. -->\n  <section class=\"grid\" id=\"grid\" data-screen-label=\"Sections Grid\">\n\n    <!-- =============== §1 每周阅读结构 =============== -->\n    <article class=\"card\" data-section=\"1\" tabindex=\"0\" role=\"button\" aria-label=\"查看第 1 节详情\">\n      <div class=\"card__compact\">\n        <div class=\"card__top\"><span class=\"card__num\">§ 1<\u002Fspan><\u002Fdiv>\n        <h2 class=\"card__title\">每周阅读结构<\u002Fh2>\n        <p class=\"card__summary\">1 篇精读 + 5 篇略读，两种不同的 AI 使用策略。<\u002Fp>\n        <div class=\"card__meta\">\n          <span>查看详情<\u002Fspan>\n          <svg class=\"card__chev\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\"><path d=\"M5 3l5 5-5 5\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card__full\" aria-hidden=\"true\">\n        <div class=\"full\">\n          <header class=\"full__head\">\n            <div class=\"full__headcontent\">\n              <p class=\"full__tag\">作业要求 · Section 01<\u002Fp>\n              <div class=\"full__titlerow\"><span class=\"full__num\">§ 1<\u002Fspan><h2 class=\"full__title\">每周阅读结构<\u002Fh2><\u002Fdiv>\n            <\u002Fdiv>\n            <button class=\"close-btn js-close\" type=\"button\" aria-label=\"关闭\">\n              <svg viewBox=\"0 0 14 14\" fill=\"none\" aria-hidden=\"true\"><path d=\"M1 1l12 12M13 1L1 13\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fheader>\n          <div class=\"full__body\">\n            <p class=\"lead\">每周阅读 <em class=\"hl\">6 篇心理学学术文献<\u002Fem>：<strong>1 篇精读<\u002Fstrong> + <strong>5 篇略读<\u002Fstrong>。<\u002Fp>\n            <p>精读对应<em class=\"hl\">人与 AI 的协同阅读<\u002Fem>，略读对应 <em class=\"hl\">AI 主导、Human in the Loop（人机回环）<\u002Fem>的阅读 —— 两者训练的是不同的 AI 使用策略。<\u002Fp>\n            <div class=\"callout\">全学期共 <b>6 个单元<\u002Fb>；第七单元（期末）没有此作业。<\u002Fdiv>\n            <div class=\"meta-line\">\n              <span>每周篇数 <b>6<\u002Fb><\u002Fspan>\n              <span>精读 <b>1<\u002Fb><\u002Fspan>\n              <span>略读 <b>5<\u002Fb><\u002Fspan>\n              <span>单元数 <b>6<\u002Fb><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- =============== §2 阅读流程 =============== -->\n    <article class=\"card\" data-section=\"2\" tabindex=\"0\" role=\"button\" aria-label=\"查看第 2 节详情\">\n      <div class=\"card__compact\">\n        <div class=\"card__top\"><span class=\"card__num\">§ 2<\u002Fspan><\u002Fdiv>\n        <h2 class=\"card__title\">阅读流程<\u002Fh2>\n        <p class=\"card__summary\">从 20–30 篇文献库筛选出精读和略读对象。<\u002Fp>\n        <div class=\"card__meta\">\n          <span>查看详情<\u002Fspan>\n          <svg class=\"card__chev\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\"><path d=\"M5 3l5 5-5 5\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card__full\" aria-hidden=\"true\">\n        <div class=\"full\">\n          <header class=\"full__head\">\n            <div class=\"full__headcontent\">\n              <p class=\"full__tag\">作业要求 · Section 02<\u002Fp>\n              <div class=\"full__titlerow\"><span class=\"full__num\">§ 2<\u002Fspan><h2 class=\"full__title\">阅读流程<\u002Fh2><\u002Fdiv>\n            <\u002Fdiv>\n            <button class=\"close-btn js-close\" type=\"button\" aria-label=\"关闭\">\n              <svg viewBox=\"0 0 14 14\" fill=\"none\" aria-hidden=\"true\"><path d=\"M1 1l12 12M13 1L1 13\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fheader>\n          <div class=\"full__body\">\n            <p class=\"lead\">从关键词搜索出发，先建立初步文献库，再筛出精读与略读对象。<\u002Fp>\n            <ul>\n              <li><strong>建立初步文献库<\u002Fstrong>：通过关键词搜索，先围绕自己的研究课题或研究领域找出约 <em class=\"hl\">20–30 篇<\u002Fem> 可能相关的文献。<\u002Fli>\n              <li><strong>筛选精读与略读<\u002Fstrong>：通过阅读题目和摘要，从初步文献库中确定 1 篇精读和 5 篇略读。<\u002Fli>\n            <\u002Ful>\n            <h3 class=\"subhead\">适合精读的文献<\u002Fh3>\n            <p>关键词、研究内容与自己课题高度重叠（自变量、因变量、研究关系、目标群体等）；或者是同学所研究领域的高质量综述。<\u002Fp>\n            <h3 class=\"subhead\">适合略读的文献<\u002Fh3>\n            <p>不需要完整理解整篇文章，只需要从中提取某个特定信息——如某一研究方法、量表、概念解释或理论应用方式。<\u002Fp>\n            <h3 class=\"subhead\">过程中可以调整<\u002Fh3>\n            <p>在阅读过程中如发现判断需要调整，可以中途升级或降级，但需在笔记中用一两句话说明理由。<\u002Fp>\n            <div class=\"callout\"><b>前两个单元：<\u002Fb>研究方向尚未稳定的同学可以保持弹性。从第三单元起，所选文献必须能清楚说明与自己研究课题的具体相关性。<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- =============== §3 精读笔记的提交结构 =============== -->\n    <article class=\"card\" data-section=\"3\" tabindex=\"0\" role=\"button\" aria-label=\"查看第 3 节详情\">\n      <div class=\"card__compact\">\n        <div class=\"card__top\"><span class=\"card__num\">§ 3<\u002Fspan><\u002Fdiv>\n        <h2 class=\"card__title\">精读笔记的提交结构<\u002Fh2>\n        <p class=\"card__summary\">APA + 高亮 PDF + Prompt 对比 + 批判提问 + 个人联结。<\u002Fp>\n        <div class=\"card__meta\">\n          <span>查看详情<\u002Fspan>\n          <svg class=\"card__chev\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\"><path d=\"M5 3l5 5-5 5\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card__full\" aria-hidden=\"true\">\n        <div class=\"full\">\n          <header class=\"full__head\">\n            <div class=\"full__headcontent\">\n              <p class=\"full__tag\">作业要求 · Section 03<\u002Fp>\n              <div class=\"full__titlerow\"><span class=\"full__num\">§ 3<\u002Fspan><h2 class=\"full__title\">精读笔记的提交结构<\u002Fh2><\u002Fdiv>\n            <\u002Fdiv>\n            <button class=\"close-btn js-close\" type=\"button\" aria-label=\"关闭\">\n              <svg viewBox=\"0 0 14 14\" fill=\"none\" aria-hidden=\"true\"><path d=\"M1 1l12 12M13 1L1 13\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fheader>\n          <div class=\"full__body\">\n            <p class=\"lead\">精读笔记必须使用 <strong>课程提供的统一模板<\u002Fstrong>（独立文件，发布于本单元）。提交前请删除模板中所有「▼ 仅供同学理解作业要求」标记的说明块。<\u002Fp>\n\n            <h3 class=\"subhead\"><span class=\"num\">3.1<\u002Fspan>文献引用 + 高亮 PDF<\u002Fh3>\n            <ul>\n              <li>完整的 <em class=\"hl\">APA 第七版<\u002Fem>文末引用。<\u002Fli>\n              <li>上传精读文献的完整 PDF，按以下三类要求进行高亮：\n                <ul>\n                  <li><strong>第一类<\u002Fstrong>：3.3 节差异对比分析所依据的原文段落（AI 没有读到的部分、以及 AI 写错或不完整对应的原文部分）。<\u002Fli>\n                  <li><strong>第二类<\u002Fstrong>：3.4 节批判性提问所依据的原文段落（如果疑问的根据来自原文）。<\u002Fli>\n                  <li><strong>第三类<\u002Fstrong>：3.5 节个人联结与反思所依据的原文段落（如果反思来自某个具体段落、研究发现、理论解释或方法细节）。<\u002Fli>\n                <\u002Ful>\n              <\u002Fli>\n              <li>使用 Adobe Reader 免费版即可完成高亮，不强制要求 Acrobat Pro。<\u002Fli>\n            <\u002Ful>\n\n            <h3 class=\"subhead\"><span class=\"num\">3.2<\u002Fspan>Prompt 设计与 2–3 个核心问题的人机对比回答<\u002Fh3>\n            <ul>\n              <li>同学自己设计的 Prompt 全文（可使用、修改或完全重写模板提供的基础 Prompt）。<\u002Fli>\n              <li>Prompt 中必须包含 <em class=\"hl\">2–3 个对自己最重要的问题<\u002Fem>（最少 2 个，不能少于 2 个）。<\u002Fli>\n              <li>Prompt 中必须明确写出选择这篇文献做精读的理由，理由需要结合下列至少一项：\n                <ul>\n                  <li>自己当前的研究课题<\u002Fli>\n                  <li>自己的生活经历、个人想法或研究设计<\u002Fli>\n                  <li>如果还没有确定的研究课题，可以是自己围绕潜在研究方向的具体思考<\u002Fli>\n                <\u002Ful>\n              <\u002Fli>\n              <li><strong>强烈建议<\u002Fstrong>：先独立回答这 2–3 个问题，再用 Prompt 让 AI 回答相同问题。两份回答并列呈现。<\u002Fli>\n              <li>注明使用的 AI 平台与模型版本。<\u002Fli>\n            <\u002Ful>\n            <div class=\"callout\">本作业不强制要求「先自己答、再 AI 答」的顺序，同学也可以反过来。但如果以 AI 输出为基础回到原文找对应内容、再写出与 AI 类似的回答，3.3 节的差异对比将很难写出深度，会显著影响该项得分。<\u002Fdiv>\n\n            <h3 class=\"subhead\"><span class=\"num\">3.3<\u002Fspan>差异对比分析<\u002Fh3>\n            <p>把自己的回答和 AI 的回答放在一起对照，从两个方向分别展开，每个方向不少于 <em class=\"hl\">200 字<\u002Fem>：<\u002Fp>\n            <ul>\n              <li><strong>(a) AI 在哪些地方写得比同学更好<\u002Fstrong>：具体说明 AI 提到了哪些同学没有读到的论文内容；同学第一次阅读时为什么没有读到这一部分。<\u002Fli>\n              <li><strong>(b) AI 在哪些地方不完整或存在问题<\u002Fstrong>：具体说明问题在哪里——错误页码？虚构引用？过度泛化？回到原文核查后给出依据。<\u002Fli>\n            <\u002Ful>\n            <p>两个方向的共同要求：<\u002Fp>\n            <ul>\n              <li>在 PDF 中高亮对应段落：(a) 同学没有读到但被 AI 提到的论文内容；(b) AI 写错或不完整所对应的原文段落。<\u002Fli>\n              <li>在差异对比分析的文字中引用原文：使用原文引用（带引号）作为依据，告诉老师 AI 哪里没有概括到、哪里比自己读得更全面、哪里写错了。<\u002Fli>\n            <\u002Ful>\n            <div class=\"callout\"><b>诚实优先：<\u002Fb>如果某个问题上 AI 与同学自己的回答差距确实很小，请直接写出「基本一致」。但如果三个问题都只写「基本一致」，本部分得分会受影响——这通常意味着没有真正做对照。<\u002Fdiv>\n\n            <h3 class=\"subhead\"><span class=\"num\">3.4<\u002Fspan>2 个批判性提问<\u002Fh3>\n            <p>请提出 <em class=\"hl\">2 个<\u002Fem>真实的批判性提问。提问可以是严肃的学术性问题，也可以是真实的个人困惑——重要的是它必须<em class=\"hl\">真实<\u002Fem>，并且必须落到论文中某一个<em class=\"hl\">具体的出发点<\u002Fem>。<\u002Fp>\n            <p>要求：<\u002Fp>\n            <ul>\n              <li><strong>必须有依据<\u002Fstrong>：提问要在文献中找到出发点，不能脱离文献凭空构思。如果根据来自原文的具体段落，必须在 PDF 中高亮该段落（对应 3.1 节第二类高亮）；如果是对论文整体的提问，必须说明是从文献的哪一部分内容引发的。<\u002Fli>\n              <li><strong>必须具体<\u002Fstrong>：避免一般性、泛泛而谈的问题。本作业接受的提问应当针对论文的具体内容，包括：\n                <ul>\n                  <li>论文文献综述部分中的某一处论述或推论<\u002Fli>\n                  <li>某个具体信息或结论<\u002Fli>\n                  <li>某个理论的具体应用方式<\u002Fli>\n                  <li>某一个具体的研究方法<\u002Fli>\n                <\u002Ful>\n              <\u002Fli>\n              <li><strong>个人困惑也必须落到具体内容<\u002Fstrong>：如果提问源自个人经验或现实生活中的困惑，也必须把这种困惑落到论文中的某一处结论、某一项发现、某一个具体环节上。可以是由整体论点引发的困惑，但作为本作业的提问，必须进一步指向一个具体的论文出发点（如某个结论、某项数据、某段论述）。单纯停留在「对整体不太理解」「有些疑虑」这类层面的困惑会因不具体而被扣分。<\u002Fli>\n            <\u002Ful>\n            <p>每个提问按以下三层展开。每个提问（包括提问本身与三层解释）合计不少于 <em class=\"hl\">200 字<\u002Fem>：<\u002Fp>\n            <ol>\n              <li>提问是什么——指向论文的哪一部分。<\u002Fli>\n              <li>为什么会有这个提问。<\u002Fli>\n              <li>打算如何进一步寻找答案。<\u002Fli>\n            <\u002Fol>\n\n            <h3 class=\"subhead\"><span class=\"num\">3.5<\u002Fspan>个人联结与研究反思<\u002Fh3>\n            <p>不少于 200 字。结合自己的研究初心（即最初让自己想做这个课题的具体经历、问题或观察）或当前研究课题，写一段反思：这篇文献中的哪些内容触动了同学？为什么会触动？它与同学的研究初心或当前研究方向之间有什么关系？<\u002Fp>\n            <ul>\n              <li><strong>必须聚焦研究<\u002Fstrong>：联结点必须连到自己的研究初心或具体研究课题，而不是泛泛讨论生活经历。<\u002Fli>\n              <li><strong>必须具体<\u002Fstrong>：要点出文献中的哪一个观点、哪一个发现、哪一个理论框架与自己的研究产生关系。<\u002Fli>\n              <li><strong>必须可追溯<\u002Fstrong>：如果反思来自原文的具体段落、研究发现、理论解释或方法细节，必须在 PDF 中高亮对应原文（对应 3.1 节第三类高亮）。<\u002Fli>\n              <li>不必硬套「印证 / 修正 / 冲突」等具体框架：可以从这些角度看，但具体怎么表达由同学自己决定。<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- =============== §4 略读笔记的提交结构 =============== -->\n    <article class=\"card\" data-section=\"4\" tabindex=\"0\" role=\"button\" aria-label=\"查看第 4 节详情\">\n      <div class=\"card__compact\">\n        <div class=\"card__top\"><span class=\"card__num\">§ 4<\u002Fspan><\u002Fdiv>\n        <h2 class=\"card__title\">略读笔记的提交结构<\u002Fh2>\n        <p class=\"card__summary\">5 篇略读的 Prompt 设计、AI 输出与追问。<\u002Fp>\n        <div class=\"card__meta\">\n          <span>查看详情<\u002Fspan>\n          <svg class=\"card__chev\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\"><path d=\"M5 3l5 5-5 5\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card__full\" aria-hidden=\"true\">\n        <div class=\"full\">\n          <header class=\"full__head\">\n            <div class=\"full__headcontent\">\n              <p class=\"full__tag\">作业要求 · Section 04<\u002Fp>\n              <div class=\"full__titlerow\"><span class=\"full__num\">§ 4<\u002Fspan><h2 class=\"full__title\">略读笔记的提交结构<\u002Fh2><\u002Fdiv>\n            <\u002Fdiv>\n            <button class=\"close-btn js-close\" type=\"button\" aria-label=\"关闭\">\n              <svg viewBox=\"0 0 14 14\" fill=\"none\" aria-hidden=\"true\"><path d=\"M1 1l12 12M13 1L1 13\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fheader>\n          <div class=\"full__body\">\n            <p class=\"lead\">略读笔记不使用模板。每篇略读包含以下内容。<\u002Fp>\n\n            <h3 class=\"subhead\"><span class=\"num\">4.1<\u002Fspan>Prompt 设计<\u002Fh3>\n            <ul>\n              <li>完整的 Prompt 文本。<\u002Fli>\n              <li>Prompt 中必须明确写出 <em class=\"hl\">「为什么读这一篇」<\u002Fem>——这是评分的核心。理由必须把文献的具体内容和自己研究的具体环节连起来，<strong>不接受<\u002Fstrong>「与我的研究相关」「为了了解这个领域」这类泛泛表述。<\u002Fli>\n              <li>Prompt 中要求 AI 输出不超过 <em class=\"hl\">300 字<\u002Fem>。<\u002Fli>\n              <li>由于每一篇略读服务于研究的环节本就不同，五篇略读的 Prompt 自然会各不相同。<\u002Fli>\n            <\u002Ful>\n\n            <h3 class=\"subhead\"><span class=\"num\">4.2<\u002Fspan>AI 输出<\u002Fh3>\n            <ul>\n              <li>不超过 <em class=\"hl\">300 字<\u002Fem>（通过 Prompt 控制）。<\u002Fli>\n              <li>作为 Prompt 执行证据提交。<\u002Fli>\n            <\u002Ful>\n\n            <h3 class=\"subhead\"><span class=\"num\">4.3<\u002Fspan>追问与追问的 AI 输出<\u002Fh3>\n            <p>和 AI 的互动不应该是一锤子买卖。如果对主 Prompt 的 AI 输出产生真实好奇，可以继续追问——根据 AI 的初步回答继续提问、修正问题、要求补充或比较。提交追问的 Prompt 全文和 AI 输出。<\u002Fp>\n            <div class=\"callout\"><b>注意：<\u002Fb>五篇略读中至少要有 <b>1 篇<\u002Fb>做了追问才能得到 2 分。如果五篇都没有追问，本项不得分。<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- =============== §5 五篇略读总评 =============== -->\n    <article class=\"card\" data-section=\"5\" tabindex=\"0\" role=\"button\" aria-label=\"查看第 5 节详情\">\n      <div class=\"card__compact\">\n        <div class=\"card__top\"><span class=\"card__num\">§ 5<\u002Fspan><\u002Fdiv>\n        <h2 class=\"card__title\">五篇略读总评<\u002Fh2>\n        <p class=\"card__summary\">跨文献整合，写出综述能力的小规模训练。<\u002Fp>\n        <div class=\"card__meta\">\n          <span>查看详情<\u002Fspan>\n          <svg class=\"card__chev\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\"><path d=\"M5 3l5 5-5 5\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card__full\" aria-hidden=\"true\">\n        <div class=\"full\">\n          <header class=\"full__head\">\n            <div class=\"full__headcontent\">\n              <p class=\"full__tag\">作业要求 · Section 05<\u002Fp>\n              <div class=\"full__titlerow\"><span class=\"full__num\">§ 5<\u002Fspan><h2 class=\"full__title\">五篇略读总评<\u002Fh2><\u002Fdiv>\n            <\u002Fdiv>\n            <button class=\"close-btn js-close\" type=\"button\" aria-label=\"关闭\">\n              <svg viewBox=\"0 0 14 14\" fill=\"none\" aria-hidden=\"true\"><path d=\"M1 1l12 12M13 1L1 13\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fheader>\n          <div class=\"full__body\">\n            <p class=\"lead\">完成 5 篇略读笔记之后，写一段五篇略读的<em class=\"hl\">整合总评<\u002Fem>，不少于 <em class=\"hl\">300 字<\u002Fem>。<\u002Fp>\n            <p>要求：<\u002Fp>\n            <ul>\n              <li>至少点名引用 5 篇略读中的<strong>每一篇<\u002Fstrong>，说明它分别从哪个角度补充了自己的研究认识。<\u002Fli>\n              <li>必须具体到自己研究的哪个环节受到了影响：理论框架、研究问题、研究方法、研究假设、目标群体认识、测量工具选择等。<\u002Fli>\n              <li>不接受「对我的研究有帮助」这类空泛表述。<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- =============== §6 文献选择 =============== -->\n    <article class=\"card\" data-section=\"6\" tabindex=\"0\" role=\"button\" aria-label=\"查看第 6 节详情\">\n      <div class=\"card__compact\">\n        <div class=\"card__top\"><span class=\"card__num\">§ 6<\u002Fspan><\u002Fdiv>\n        <h2 class=\"card__title\">文献选择<\u002Fh2>\n        <p class=\"card__summary\">可选文献类型、综述与期刊优先顺序、语言策略。<\u002Fp>\n        <div class=\"card__meta\">\n          <span>查看详情<\u002Fspan>\n          <svg class=\"card__chev\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\"><path d=\"M5 3l5 5-5 5\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card__full\" aria-hidden=\"true\">\n        <div class=\"full\">\n          <header class=\"full__head\">\n            <div class=\"full__headcontent\">\n              <p class=\"full__tag\">作业要求 · Section 06<\u002Fp>\n              <div class=\"full__titlerow\"><span class=\"full__num\">§ 6<\u002Fspan><h2 class=\"full__title\">文献选择<\u002Fh2><\u002Fdiv>\n            <\u002Fdiv>\n            <button class=\"close-btn js-close\" type=\"button\" aria-label=\"关闭\">\n              <svg viewBox=\"0 0 14 14\" fill=\"none\" aria-hidden=\"true\"><path d=\"M1 1l12 12M13 1L1 13\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fheader>\n          <div class=\"full__body\">\n            <h3 class=\"subhead\"><span class=\"num\">6.1<\u002Fspan>可选的文献类型<\u002Fh3>\n            <ul>\n              <li>心理学学术期刊论文（综述或实证均可）<\u002Fli>\n              <li>心理学硕士 / 博士学位论文<\u002Fli>\n              <li>心理学学术书籍（如 Handbook 等）的单个章节<\u002Fli>\n            <\u002Ful>\n\n            <h3 class=\"subhead\"><span class=\"num\">6.2<\u002Fspan>不可选的文献类型<\u002Fh3>\n            <ul>\n              <li>整本书籍（章节可以，整本不可）<\u002Fli>\n              <li>科普文章<\u002Fli>\n              <li>非学术性媒体文章<\u002Fli>\n            <\u002Ful>\n\n            <h3 class=\"subhead\"><span class=\"num\">6.3<\u002Fspan>文献选择的优先顺序<\u002Fh3>\n            <p><strong>综述类<\u002Fstrong>，建议按以下顺序选择：<\u002Fp>\n            <ul>\n              <li>优先选择英文综述文献<\u002Fli>\n              <li>如果无法阅读英文综述，可以选择中文综述<\u002Fli>\n              <li>如果找不到合适的中文综述，可以选择中文的实证研究替代综述<\u002Fli>\n            <\u002Ful>\n            <p><strong>中文期刊<\u002Fstrong>，建议优先选择以下核心研究期刊：<\u002Fp>\n            <ul>\n              <li>《心理学报》<\u002Fli>\n              <li>《心理科学》<\u002Fli>\n              <li>《心理科学进展》<\u002Fli>\n            <\u002Ful>\n\n            <h3 class=\"subhead\"><span class=\"num\">6.4<\u002Fspan>利用 AI 跨越语言障碍<\u002Fh3>\n            <p>鼓励同学借助 AI 工具（包括 Adobe Reader 自带的翻译功能、浏览器翻译插件、ChatGPT 等）辅助阅读英文文献。学会用 AI 跨越语言门槛，本身就是 AI 时代研究者必备的能力。在心理学领域，<em class=\"hl\">只读中文文献和能够阅读英文文献，几乎是两个不同的世界<\u002Fem>。<\u002Fp>\n\n            <h3 class=\"subhead\"><span class=\"num\">6.5<\u002Fspan>必须与心理学相关<\u002Fh3>\n            <p>所选文献必须与心理学相关。如果大量选择非心理学相关的文献，会直接影响评分。<\u002Fp>\n            <div class=\"callout\">每一篇阅读的文献都必须与同学自己的<b>研究计划报告<\u002Fb>产生具体联系。<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- =============== §7 提交格式 =============== -->\n    <article class=\"card\" data-section=\"7\" tabindex=\"0\" role=\"button\" aria-label=\"查看第 7 节详情\">\n      <div class=\"card__compact\">\n        <div class=\"card__top\"><span class=\"card__num\">§ 7<\u002Fspan><\u002Fdiv>\n        <h2 class=\"card__title\">提交格式 &amp; 作业提示<\u002Fh2>\n        <p class=\"card__summary\">模板、字体、行距、文件类型与提交要求。<\u002Fp>\n        <div class=\"card__meta\">\n          <span>查看详情<\u002Fspan>\n          <svg class=\"card__chev\" viewBox=\"0 0 16 16\" fill=\"none\" aria-hidden=\"true\"><path d=\"M5 3l5 5-5 5\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card__full\" aria-hidden=\"true\">\n        <div class=\"full\">\n          <header class=\"full__head\">\n            <div class=\"full__headcontent\">\n              <p class=\"full__tag\">作业要求 · Section 07<\u002Fp>\n              <div class=\"full__titlerow\"><span class=\"full__num\">§ 7<\u002Fspan><h2 class=\"full__title\">提交格式<\u002Fh2><\u002Fdiv>\n            <\u002Fdiv>\n            <button class=\"close-btn js-close\" type=\"button\" aria-label=\"关闭\">\n              <svg viewBox=\"0 0 14 14\" fill=\"none\" aria-hidden=\"true\"><path d=\"M1 1l12 12M13 1L1 13\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fheader>\n          <div class=\"full__body\">\n            <h3 class=\"subhead\"><span class=\"num\">7.1<\u002Fspan>需提交的三份文件<\u002Fh3>\n            <ul>\n              <li><strong>精读笔记文档<\u002Fstrong>：按照课程统一模板填写。<\u002Fli>\n              <li><strong>略读笔记文档<\u002Fstrong>：包含 5 篇略读的所有内容 + 五篇略读总评。<\u002Fli>\n              <li><strong>精读文献的高亮 PDF<\u002Fstrong>：高亮要求详见 3.1、3.3、3.4、3.5 节。<\u002Fli>\n            <\u002Ful>\n\n            <h3 class=\"subhead\"><span class=\"num\">7.2<\u002Fspan>文档格式<\u002Fh3>\n            <ul>\n              <li>中文宋体（SimSun）、英文 Times New Roman、<em class=\"hl\">12 号字<\u002Fem><\u002Fli>\n              <li>单倍行距<\u002Fli>\n              <li>段前段后无额外间距<\u002Fli>\n              <li>页边距 1 英寸（2.54 厘米）<\u002Fli>\n            <\u002Ful>\n\n            <h3 class=\"subhead\"><span class=\"num\">7.3<\u002Fspan>文件类型<\u002Fh3>\n            <ul>\n              <li>doc、docx 或 pdf<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n  <\u002Fsection>\n\n  <!-- ========== Footer ========== -->\n  <footer class=\"footer\">\n    <span class=\"footer__brand\">\n      <span class=\"bar\"><\u002Fspan>\n      <span class=\"bar gold\"><\u002Fspan>\n      <span>Arizona State University<\u002Fspan>\n    <\u002Fspan>\n    <span>PSY 553 · Capstone · 顶点课程<\u002Fspan>\n    <span>\n<\u002Fspan>\n  <\u002Ffooter>\n<\u002Fmain>\n\n<!-- ========== Scrim ========== -->\n<div class=\"scrim\" id=\"scrim\" aria-hidden=\"true\"><\u002Fdiv>\n\n<!-- ========== Shared explanation panel ========== -->\n<aside class=\"explain\" id=\"explain\" aria-hidden=\"true\" aria-labelledby=\"explainTitle\">\n  <header class=\"explain__head\">\n    <div class=\"explain__headcontent\">\n      <span class=\"explain__badge\"><span class=\"dot\"><\u002Fspan>为什么这样做 · Why this design<\u002Fspan>\n      <h3 class=\"explain__title\" id=\"explainTitle\">教学解释<\u002Fh3>\n      <p class=\"explain__kicker\" id=\"explainKicker\"><\u002Fp>\n    <\u002Fdiv>\n    <button class=\"close-btn js-close\" type=\"button\" aria-label=\"关闭\">\n      <svg viewBox=\"0 0 14 14\" fill=\"none\" aria-hidden=\"true\"><path d=\"M1 1l12 12M13 1L1 13\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fheader>\n  <div class=\"explain__body\" id=\"explainBody\"><\u002Fdiv>\n<\u002Faside>\n\n<script>\n(function () {\n  'use strict';\n\n  /* =========================================================\n     SECTIONS — explanation copy keyed by section number.\n     ---------------------------------------------------------\n     To extend: just add or edit entries here. The HTML supports\n     <h3 class=\"subhead\"><span class=\"num\">3.1<\u002Fspan>…<\u002Fh3>\n     for subsection headers, and <blockquote class=\"pull\">…<\u002Fblockquote>\n     for pull-quotes.\n     ========================================================= */\n  var SECTIONS = {\n    \"1\": {\n      explainTitle: \"关于 1 精读 + 5 略读：为什么是这个结构\",\n      explainKicker: \"1 + 5 不是随意的比例，而是两种不同的 AI 使用策略。\",\n      explainHTML:\n        '<p>虽然文献阅读量很大，但并不是所有文章都需要精读。学术研究中的阅读，本来就不是把每一篇文献都从头到尾读懂。任何一篇正式发表的论文，后面都可能引用了几十篇甚至上百篇文献。研究者在阅读时，不可能、也没有必要把这些文献篇篇精读。真正重要的是判断：哪些文献需要非常仔细地读，哪些文献只需要快速提取对自己研究有用的信息。<\u002Fp>' +\n        '<p>本作业采用 1 篇精读 + 5 篇略读的结构，就是为了训练这种判断能力。精读是需要专门设计的阅读，必须读得非常仔细；略读则是为了在更大的文献范围内快速获取信息、判断相关性、寻找线索。这个 1:5 的比例不是随意安排的，而是符合学术研究中文献阅读的基本结构：少数文献需要深度进入，多数文献则服务于信息扫描、概念定位和研究脉络的建立。<\u002Fp>' +\n        '<blockquote class=\"pull\">在 AI 时代，精读和略读的区别不只是「读得深」还是「读得浅」，而是代表了两种完全不同的 AI 使用方式。<\u002Fblockquote>' +\n        '<p>精读强调的是「人与 AI 的协同阅读」。在精读过程中，同学一定要有大量的个人思考。只有自己先进入原文，形成判断，再和 AI 的分析进行对照，同学才能真正意识到个人阅读和 AI 阅读之间的差异，也才能逐渐搞清楚什么时候应该使用 AI，什么时候必须由自己亲自读、亲自判断。换句话说，精读不是排斥 AI，而是把 AI 放进一个需要人类主导、反复核查和深入思考的阅读过程中。<\u002Fp>' +\n        '<p>略读则更接近「以 AI 为主导、Human in the Loop（人机回环）」的阅读方式。略读的重点不是同学把每一篇文章都完整读懂，而是设计合适的 Prompt，让 AI 帮助提取信息、整理要点、比较文献，并判断这篇文献对自己研究的具体价值。在这个过程中，人仍然在回路中：同学要决定问什么、提取什么、相信什么、保留什么，以及这篇文献是否值得进一步精读。<\u002Fp>' +\n        '<p>所以，AI 的到来已经改变了我们对传统「精读」和「略读」的理解。虽然我们仍然沿用这两个词，但在本作业中，它们不只是两种阅读深度，而是两种不同的 AI 使用策略。精读训练的是人在 AI 参与下如何保持判断力；略读训练的是如何借助 AI 扩大阅读范围、提高信息提取的效率和全面性。<\u002Fp>'\n    },\n\n    \"2\": {\n      explainTitle: \"关于阅读流程：如何挑选文献，并决定哪一篇精读、哪些只需略读\",\n      explainKicker: \"文献筛选看上去只是前期准备，其实是学术训练的一部分。\",\n      explainHTML:\n        '<p>文献筛选看上去只是一个前期准备步骤，但其实非常重要。研究者不是随便找到几篇文章就开始读，而是先建立一个相对完整的文献库，再从中判断哪些文献值得精读，哪些文献只需要略读。这个判断本身，就是学术训练的一部分。<\u002Fp>' +\n        '<p>在最开始搜索文献时，核心动作是阅读题目和摘要。同学不要只盯着最先找到的五六篇文章，而是要先通过关键词搜索建立一个初步文献库。一般来说，建议先找出大约 20 到 30 篇可能相关的文章。然后，在记录文献清单的过程中，通过阅读题目和摘要，从这些文章中筛选出大约 1 篇用于精读、5 篇用于略读。<\u002Fp>' +\n        '<p>判断一篇文献应该精读还是略读，核心标准是<strong>关键词和研究内容的重叠度<\u002Fstrong>。如果一篇文章的研究问题和同学自己的题目非常相似，包括自变量、因变量、研究关系，甚至研究人群也高度接近，那么这类文章通常最值得精读。研究人群不一定要完全一致，但核心变量和研究关系越接近，这篇文章就越可能成为后续阅读和研究设计的重要起点。<\u002Fp>' +\n        '<p>另外，<strong>领域综述也非常适合精读<\u002Fstrong>。比如，同学正在研究某个具体课题，如果找到一篇关于该领域的高质量综述文章，虽然它的范围可能比同学自己的题目更宏观，读起来也更难，但它可以帮助同学快速理解这个领域的基本结构、核心概念、主要争议和常见研究方法。因此，综述性文章常常适合作为入门阶段的精读材料。<\u002Fp>' +\n        '<p>略读则适用于另一类情况：同学并不需要完整理解整篇文章，只需要从中提取某个特定信息。比如，同学可能只想了解这篇文章使用了什么研究方法，采用了什么量表，如何解释某个概念，如何引入某个理论，或者如何说明这个研究领域的重要性。对于这类文献，略读就足够了。它们不一定和同学的题目高度重合，但可以为同学的研究提供局部材料。<\u002Fp>' +\n        '<blockquote class=\"pull\">前两个单元可以保持弹性；从第三单元开始，文献选择必须能清楚地服务于同学自己的研究计划。<\u002Fblockquote>' +\n        '<p>考虑到同学最初的研究题目可能还没有完全定下来，前期选择的文献后面发生调整是正常的。但从第三、四单元开始，在批改过程中，我必须能够看到同学选择的文献与研究主题之间有密切的相关性。也就是说，越到后期，文献选择就越不能只是「看起来和心理学有关」，而必须清楚地服务于同学自己的研究计划。<\u002Fp>'\n    },\n\n    \"3\": {\n      explainTitle: \"关于精读笔记：每个子节背后的训练目标\",\n      explainKicker: \"高亮、对比、提问、联结 —— 都在训练「人如何驾驭 AI」。\",\n      explainHTML:\n        '<h3 class=\"subhead\"><span class=\"num\">3.1<\u002Fspan>关于高亮 PDF：为什么读完要留下阅读痕迹<\u002Fh3>' +\n        '<p>在 AI 时代，老师不能只看同学最后写出来的内容，因为 AI 也可以生成很多看起来完整、流畅、合理的解释。因此，本作业要求同学在精读时必须对 PDF 原文进行高亮处理。高亮的目的不是为了形式，而是为了让老师能够看到：同学的想法确实是通过阅读原文产生的，而不是只来自 AI 的总结或改写。<\u002Fp>' +\n        '<p>同学可以使用 Adobe Reader 免费版完成高亮。只要能够清楚标出自己认真阅读过的原文位置，就已经满足基本要求。如果同学有 Adobe Acrobat Pro 版，也可以进一步使用批注功能。ASU 学校账号可以申请免费的 Pro 版，但本作业不强制要求使用 Pro 版。<\u002Fp>' +\n        '<p>关于 PDF 需要高亮的部分，在每个部分的作业具体要求中都会有明确说明。一般来说，具体需要高亮的内容包括三类：<strong>对比分析中的理由部分<\u002Fstrong>、<strong>提出疑问的依据<\u002Fstrong>、以及<strong>个人反思总结的来源<\u002Fstrong>。<\u002Fp>' +\n        '<p>之所以要求高亮，是为了让教师能够确认：这些想法确实是同学通过阅读原文而产生的，而不是直接使用 AI 生成的内容。我们希望看到的，不是 AI 替同学完成的阅读总结，而是同学真正进入原文之后形成的思考。如果同学是先根据 AI 生成的内容，再回到原文中寻找相似内容，并据此写出自己的分析，那么在对比分析部分会丢失大量分数。<\u002Fp>' +\n\n        '<h3 class=\"subhead\"><span class=\"num\">3.2<\u002Fspan>关于 Prompt 设计：为什么建议先自己回答，再让 AI 回答<\u002Fh3>' +\n        '<p>这是精读的核心环节，也是本作业中训练同学驾驭 AI 的核心环节。它训练的不是简单地「会不会问 AI」，而是让同学通过真实的使用和对比，逐渐理解 AI 擅长什么，以及 AI 是如何从文献中获取和组织信息的。<\u002Fp>' +\n        '<p>通过先自己阅读和回答，再让 AI 回答，同学才能真正看清几个关键问题：第一，AI 的擅长领域是什么；第二，什么时候最有必要使用 AI；第三，哪些内容是 AI 容易忽略、不擅长处理，或者需要人类阅读者亲自判断的部分。第三点尤其重要，因为这些正是同学在精读中需要完成的核心工作。<\u002Fp>' +\n        '<p>同学可以使用老师提供的 Prompt，但这还不够。老师提供的 Prompt 通常比较通用，只能作为一般性的范例。每位同学的研究课题都不同，真正有效的 Prompt 必须服务于同学自己的研究问题。因此，同学需要在老师提供的范例基础上，准备更具体、更个性化的问题。这个过程训练的是同学如何把自己的研究需要转化为可以指挥 AI 的问题。<\u002Fp>' +\n        '<blockquote class=\"pull\">如果是先根据 AI 生成的内容再去阅读原文、并写出与 AI 类似的内容，对比分析部分会丢失大量分数。<\u002Fblockquote>' +\n        '<p>从训练角度来说，我建议同学尽量先自己撰写回答，然后再让 AI 生成回答。只有这样，对比分析才有真正的基础。同学先有了自己的理解，才能看出 AI 的回答在哪些地方更全面，哪些地方更表面，哪些地方忽略了原文中的细节，哪些地方反而帮助同学发现了自己没有注意到的信息。<\u002Fp>' +\n\n        '<h3 class=\"subhead\"><span class=\"num\">3.3<\u002Fspan>关于双向差异对比：为什么不只是挑错<\u002Fh3>' +\n        '<p>差异对比是「学会评价 AI」的具体动作，也是本作业最核心的训练之一。要求从两个方向展开，是为了避免同学陷入两种常见的极端：要么把 AI 当成权威照单全收，要么把 AI 当成草稿盲目质疑。真正会用 AI 的人，知道 AI 在哪些任务上更擅长，在哪些任务上必须由自己核查。<\u002Fp>' +\n        '<p>这种判断力只能通过真正的对照练习来建立。每一次同学做完对比分析，对 AI 的能力边界就会更清楚一些。学期结束时，同学应当对 AI 在学术文献阅读上的优势和局限有相对稳定的认识。<\u002Fp>' +\n        '<p>诚实的核查比编造差异更有价值。如果某个问题上 AI 与同学自己的回答差距确实很小，请直接写出「基本一致」。但如果三个问题都只写「基本一致」，本部分得分会受影响——这通常意味着同学没有真正做对照。<\u002Fp>' +\n\n        '<h3 class=\"subhead\"><span class=\"num\">3.4<\u002Fspan>关于批判性提问：为什么提问比答题更重要<\u002Fh3>' +\n        '<p>阅读学术文献不是被动地把一篇文章从头读到尾，而是<strong>带着问题去读<\u002Fstrong>，并在阅读过程中不断产生新的问题。在 AI 时代，能够提出真实的问题是一种非常宝贵的能力。AI 可以回答已经被明确提出的问题，但如果同学自己没有问题，就很难真正有效地使用 AI。<\u002Fp>' +\n        '<p>批判性提问还有两个作用。第一，疑问是「祛魅学术文献」的开始——学术文献不是绝对权威，每一篇都是可错的、不完整的。一个习惯于无条件接受文献结论的研究生，很难成为合格的研究者。第二，疑问是「扩展阅读的导航」——根据疑问找下一篇文献，再积累，再找下一篇，这就是学术阅读的真实模式。<\u002Fp>' +\n        '<p>批判性提问可以是严肃的学术性问题，也可以是真实的个人困惑。不要求每个提问都修饰成研究性问题。<em class=\"hl\">真实优先<\u002Fem>。一个能写出具体批判性问题的同学，比一个只写「这篇文献讲得很好，我都明白了」的同学，离真正的学术能力更近。<\u002Fp>' +\n\n        '<h3 class=\"subhead\"><span class=\"num\">3.5<\u002Fspan>关于个人联结：为什么理解必须和自己的研究 / 经验接上<\u002Fh3>' +\n        '<p>我们要求同学阅读文献，本质上不是为了让同学「知道」这篇文章说了什么，而是为了让同学真正<strong>理解<\u002Fstrong>这篇文章。所谓「理解」，不是把文章内容复述一遍，也不是把 AI 的总结改写成自己的话，而是同学能够把每一篇文章与自己的知识结构、研究目的、个人经验结合起来，建立起新的知识框架，让这篇文献成为自己知识体系的一部分。<\u002Fp>' +\n        '<p>AI 可以总结文章，可以提取重点，也可以把内容整理得很流畅，但 AI 没有同学的个人经历、研究目的、思维方式和过往记忆。它无法判断这篇文献为什么会触动同学，无法知道这篇文献和同学最初提出研究课题时的兴趣点有什么关系，也无法把文献转化成对同学个人有意义的知识。这就是我们说「AI 不会理解」的含义。<\u002Fp>' +\n        '<p>因此，「个人联结（Personal Link）」不是随便写一点生活感想，而是要求同学回到自己的研究初心。当同学最初提出这个研究课题时，初衷是什么？真正感兴趣的点是什么？这篇文章中的哪些内容触动了同学？为什么同学会对这个点产生兴趣？它和同学目前的研究方向、生活经历、工作场景、理论困惑或研究目的之间有什么关系？只有把这些问题讲清楚，文献阅读才真正完成了从「外部信息」到「个人理解」的转化。<\u002Fp>'\n    },\n\n    \"4\": {\n      explainTitle: \"关于略读笔记：为什么评分核心在 Prompt 设计\",\n      explainKicker: \"Prompt 是 AI 无法替你完成的东西。\",\n      explainHTML:\n        '<h3 class=\"subhead\"><span class=\"num\">4.1<\u002Fspan>关于略读看 Prompt 不看内容<\u002Fh3>' +\n        '<p>略读训练的不是「读懂文献」，而是<strong>设计一个能服务于自己研究的 Prompt<\u002Fstrong>。之所以评分核心在 Prompt 设计，而不在 AI 输出，是因为成品在 AI 时代已经无法可靠地反映学习过程。如果略读按「看同学写了什么内容」评分，同学完全可以让 AI 替自己读、替自己写。但 Prompt 不一样。一个好的 Prompt 必须建立在同学对自己研究的清晰认识之上，这是 AI 无法替同学完成的。<\u002Fp>' +\n        '<p>「为什么读这一篇」必须如此具体，原因正在这里。AI 可以替同学写出格式完美的「读这篇是为了……」，但它不知道同学的研究方向，不知道同学手上有什么具体的研究困境，也不知道同学最近卡在哪个具体的问题上。一个具体到「这篇文章使用了 Z 测量工具，我想看它的信度和适用人群」的理由，必然来自同学自己。这是过程评估的核心机制。<\u002Fp>' +\n        '<blockquote class=\"pull\">五篇略读的 Prompt 必须各不相同。如果五个 Prompt 高度雷同，说明同学没有真正为每篇文献单独思考阅读目的。<\u002Fblockquote>' +\n\n        '<h3 class=\"subhead\"><span class=\"num\">4.3<\u002Fspan>关于追问：为什么 AI 互动不是一锤子买卖<\u002Fh3>' +\n        '<p>和 AI 的互动不应该是一锤子买卖。真正有效的 AI 使用，往往不是提出一个问题、得到一个回答，然后就结束了。更合理的方式是根据 AI 生成的结果继续追问、修正问题、要求补充、要求比较，甚至要求 AI 回到文献中的某个具体部分重新解释。这个不断反复的过程，才是 AI 辅助阅读原本应该有的互动方式。<\u002Fp>' +\n        '<p>在本作业中，我们会为「追问」保留 2 分。具体要求是：在五篇略读文章中，至少要有一篇体现出追问的过程。也就是说，同学不需要在五篇略读中每一篇都展示完整的追问过程，只要在其中一篇作业里清楚展示自己如何根据 AI 的初步回答继续提问、推进理解，就可以满足这一项的基本要求。<\u002Fp>' +\n        '<p>我们对追问持鼓励态度，但没有完全强制，主要是为了保留同学的自主性。并不是每一篇文章都一定会引发值得展开的追问，也没有必要为了完成形式而硬凑问题。但同学需要理解，虽然这部分分数占比不多，且最低要求只是五篇中有一篇体现追问，我们仍然鼓励大家在实际阅读中进行更多、更深入的 AI 互动。<\u002Fp>' +\n        '<p>高质量的 AI 互动需要同学不断判断、追问、核查和修正，甚至在精神和体力上会感觉比普通阅读付出更多。这一点请同学务必清楚：<strong>AI 的价值不是替同学省掉思考，而是让同学在同样的时间里进行更高密度、更高质量的思考。<\u002Fstrong><\u002Fp>'\n    },\n\n    \"5\": {\n      explainTitle: \"关于五篇略读总评：为什么要做跨文献整合\",\n      explainKicker: \"这是小规模的文献综述训练。\",\n      explainHTML:\n        '<p>这是略读评分中要求最严格的部分。<\u002Fp>' +\n        '<p>它的目的是迫使同学做<strong>跨文献的合成<\u002Fstrong>——把 5 篇文献作为一个整体放在一起看，而不是写 5 个孤立的反思。这种跨文献合成的能力，是文献综述写作的真正内核。<\u002Fp>' +\n        '<blockquote class=\"pull\">文献综述不是「读过的文献的总结相加」，而是从多篇文献中提炼出一个整体性的认识。<\u002Fblockquote>' +\n        '<p>哪些主张是共识，哪些主张存在分歧，哪些是同学认同的，哪些是同学要挑战的。每周的略读总评，就是在小规模上反复练习这件事。学期结束时，同学已经做过 6 次跨文献整合训练，文献综述写作就有了底稿。<\u002Fp>' +\n        '<p>要求至少点名引用每一篇略读，是为了避免同学把「总评」写成空泛的研究感想。具体到每一篇文献做了什么贡献，是过程评估的具体抓手。<\u002Fp>' +\n        '<p>另外，任课教师会根据同学每次阅读中写出的感想和反思，将这些内容放入 AI 系统中进行辅助评分，查看这些想法是否最终体现在同学的文献综述和开题报告当中。也就是说，每一次略读总评不应只是当周作业中的孤立反思，而应该逐渐成为后续研究写作的一部分。<\u002Fp>' +\n        '<p>因此，同学要尽量避免完全脱离语境地进行反思。反思不是为了写几句看起来有深度的话，而是为了服务于一个共同目标：<strong>不断完善自己的研究目的和研究课题<\u002Fstrong>。每一次总评都应该帮助同学更清楚地理解自己的研究方向、文献位置和下一步需要解决的问题。<\u002Fp>'\n    },\n\n    \"6\": {\n      explainTitle: \"关于文献选择：为什么有这些限制\",\n      explainKicker: \"学术阅读训练，必须落到真正的学术文本上。\",\n      explainHTML:\n        '<p>本作业可以选择的文献类型包括：心理学学术期刊论文（包括综述和实证研究）；心理学硕士或博士学位论文；以及心理学学术书籍中的单个章节，比如 Handbook 中的某一章。不能选择的文献类型包括：整本书籍、科普文章，以及非学术性媒体文章。<\u002Fp>' +\n        '<p>这里特别需要解释的是，为什么不接受「整本书」作为阅读对象。第一个原因是<strong>阅读量不匹配<\u002Fstrong>。同学不可能在一周之内认真读完一整本学术书，这在时间分配上是不现实的。如果把整本书作为阅读对象，最后很容易变成只读简介、目录或 AI 总结，而不是进行真正的学术阅读。<\u002Fp>' +\n        '<p>第二个原因是<strong>学术价值和写作结构不同<\u002Fstrong>。面向大众的科普书籍通常是为了把复杂知识讲得通俗、有趣、容易传播，它们不一定按照学术研究的逻辑来组织内容。尤其是大众科普书，虽然可能有启发，但不适合作为本作业的主要阅读对象。本作业训练的是同学阅读学术文献的能力，因此更适合选择期刊论文、学位论文，或者学术书籍中的专业章节。<\u002Fp>' +\n        '<p>如果同学确实需要参考学术书籍，也不需要读完整本书，而是应该选择其中一个具体章节。很多学术书，尤其是 Handbook 或 edited volume，每一个章节往往就是一个相对独立的专业领域。阅读一个章节，比泛泛阅读整本书更符合本作业的训练目标，也更容易和同学自己的研究计划建立具体联系。<\u002Fp>' +\n        '<p>科普文章同样不建议选择。科普文章的主要目标通常是传播、吸引读者、提高点击率或扩大影响力，这和学术写作的目标不同。由于这种目的导向不同，科普文章在内容选择、标题设计、证据呈现和论证深度上，往往会受到传播效果的影响。因此，它们的学术价值通常不足以支撑本作业的文献阅读训练。<\u002Fp>' +\n        '<p>在综述类文献的选择上，我建议同学<strong>优先选择英文综述<\u002Fstrong>。原因很简单：英文综述的体量非常大，更新速度快，领域覆盖也更完整。相比之下，国内高质量心理学期刊的数量相对有限，中文综述的总体体量和覆盖范围也比较有限。因此，如果同学能够阅读英文综述，应当优先选择英文综述。<\u002Fp>' +\n        '<p>如果英文综述阅读确实有困难，同学可以选择中文综述；如果找不到合适的中文综述，也可以选择中文实证研究来替代综述。中文期刊方面，建议优先考虑《心理学报》《心理科学》《心理科学进展》等核心研究期刊。<\u002Fp>' +\n        '<blockquote class=\"pull\">在心理学领域，只读中文文献和能够阅读英文文献，几乎是两个不同的世界。<\u002Fblockquote>' +\n        '<p>AI 的出现，使同学有机会更直接地进入英文心理学文献所代表的知识世界。学会使用 AI 工具克服语言障碍，对同学的知识学习和后续发展都是非常重要的进步。<\u002Fp>' +\n        '<p>最后，所有实证研究文献都必须与心理学相关。如果同学大量选择非心理学相关的文献，会直接影响评分。更重要的是，每一篇阅读的文献都必须与同学自己的研究计划报告产生具体联系。无论是精读还是略读，文献选择都不能只是「看起来有点相关」，而必须能够说明它如何服务于同学自己的研究目的、研究问题或研究设计。<\u002Fp>'\n    },\n\n    \"7\": {\n      explainTitle: \"第一次做这个作业的几点建议\",\n      explainKicker: \"评分看的是过程，不是完美。\",\n      explainHTML:\n        '<h3 class=\"subhead\"><span class=\"num\">1.<\u002Fspan>先做精读，再做略读<\u002Fh3>' +\n        '<p>精读会让同学对研究方向的认识更深，之后做略读时，Prompt 设计也会更精准。<\u002Fp>' +\n\n        '<h3 class=\"subhead\"><span class=\"num\">2.<\u002Fspan>不要在最后一刻完成<\u002Fh3>' +\n        '<p>本作业的设计前提是「过程性的阅读和思考」。如果集中在截止日期前几小时完成，绝大部分要求都无法真正完成。AI 也帮不上忙，因为它不能替同学读出真实的疑问和真实的个人联结。建议同学每周分两到三个时段推进。<\u002Fp>' +\n\n        '<h3 class=\"subhead\"><span class=\"num\">3.<\u002Fspan>Prompt 是可以迭代的<\u002Fh3>' +\n        '<p>第一次写出来的 Prompt 可能不够具体、不够精准。完全可以让 AI 输出之后，回头修改 Prompt 再来一次。建议同学把第一次成功的精读 Prompt 和略读 Prompt 保存下来，下一篇就在它的基础上修改。学期结束时，同学应该已经有几个相对成熟的「个人 Prompt 模板」。<\u002Fp>' +\n\n        '<h3 class=\"subhead\"><span class=\"num\">4.<\u002Fspan>评分看的是过程，不是完美<\u002Fh3>' +\n        '<p>由于这是大家第一次做这种作业，评分时更关注同学是否真实地在尝试每一项要求，而不是要求每一项都做到完美。但如果某一部分用空话、套话敷衍过去，尤其是「为什么读」写得很泛、对比分析只写成「基本一致」，分数会扣得比较明显。<\u002Fp>' +\n\n        '<h3 class=\"subhead\"><span class=\"num\">5.<\u002Fspan>有疑问及时问<\u002Fh3>' +\n        '<p>第一次做这个作业，有疑问是必然的。请通过 Canvas 社区论坛或邮件及时沟通。其他同学很可能也有同样的疑问，公开提问对大家都有帮助。<\u002Fp>'\n    }\n  };\n\n  /* =========================================================\n     Target geometry — centered pair on desktop.\n     The KEY DESIGN INTENT: the \"Requirements card + gap +\n     Explanation card\" pair is horizontally centered on screen.\n     The flying card lands at the LEFT card's position; the\n     explanation panel sits to its right.\n     ========================================================= */\n  function getTargetGeometry() {\n    var vw = window.innerWidth;\n    var vh = window.innerHeight;\n    if (vw <= 768) return { mobile: true };\n\n    var gap   = 28;\n    var mainW = Math.min(460, Math.round(vw * 0.30));\n    var explW = Math.min(660, Math.round(vw * 0.40));\n    var pairW = mainW + gap + explW;\n\n    // Center the pair, leaving at least 32px margin on each side.\n    var leftPad = Math.max(32, Math.round((vw - pairW) / 2));\n    if (pairW + 64 > vw) {\n      // shrink both proportionally\n      var scale = (vw - 64) / pairW;\n      mainW = Math.floor(mainW * scale);\n      explW = Math.floor(explW * scale);\n      leftPad = 32;\n    }\n\n    var topPad    = Math.max(48, Math.round(vh * 0.08));\n    var bottomPad = Math.max(40, Math.round(vh * 0.07));\n    var height    = vh - topPad - bottomPad;\n\n    return {\n      mobile: false,\n      main: { top: topPad, left: leftPad,                 width: mainW, height: height },\n      expl: { top: topPad, left: leftPad + mainW + gap,   width: explW, height: height }\n    };\n  }\n\n  /* =========================================================\n     Open / Close\n     ========================================================= */\n  var state = { activeCard: null, placeholder: null };\n\n  var $grid          = document.getElementById('grid');\n  var $scrim         = document.getElementById('scrim');\n  var $explain       = document.getElementById('explain');\n  var $explainTitle  = document.getElementById('explainTitle');\n  var $explainKicker = document.getElementById('explainKicker');\n  var $explainBody   = document.getElementById('explainBody');\n\n  function openCard(card) {\n    if (state.activeCard) return;\n    var id = card.getAttribute('data-section');\n    var data = SECTIONS[id];\n    if (!data) return;\n\n    var geom = getTargetGeometry();\n    var rect = card.getBoundingClientRect();\n\n    // Insert placeholder to hold grid slot\n    var placeholder = document.createElement('div');\n    placeholder.className = 'card-placeholder';\n    // Match grid span so the slot stays put\n    var idx = Array.prototype.indexOf.call(card.parentNode.children, card);\n    placeholder.style.gridColumn = window.getComputedStyle(card).gridColumn;\n    placeholder.style.minHeight = rect.height + 'px';\n    card.parentNode.insertBefore(placeholder, card);\n\n    state.activeCard  = card;\n    state.placeholder = placeholder;\n\n    // Pin card at current rect (no transition)\n    card.classList.add('is-active');\n    card.style.transition = 'none';\n    card.style.top    = rect.top    + 'px';\n    card.style.left   = rect.left   + 'px';\n    card.style.width  = rect.width  + 'px';\n    card.style.height = rect.height + 'px';\n\n    $grid.classList.add('is-focused');\n    $scrim.classList.add('is-on');\n    $scrim.setAttribute('aria-hidden', 'false');\n\n    // Inject explanation copy\n    $explainTitle.textContent  = data.explainTitle || '教学解释';\n    $explainKicker.textContent = data.explainKicker || '';\n    $explainBody.innerHTML     = data.explainHTML || '';\n    $explainBody.scrollTop = 0;\n\n    /* eslint-disable no-unused-expressions */\n    card.offsetWidth; // commit\n    /* eslint-enable no-unused-expressions */\n\n    card.style.transition = '';\n    card.style.willChange = 'top, left, width, height';\n\n    if (geom.mobile) {\n      card.classList.add('is-entering');\n      var full = card.querySelector('.card__full');\n      var grab = document.createElement('span');\n      grab.className = 'sheet-grab';\n      full.insertBefore(grab, full.firstChild);\n      full.appendChild($explain);\n      $explain.classList.add('is-on');\n      $explain.setAttribute('aria-hidden', 'false');\n      card.style.top = card.style.left = card.style.width = card.style.height = '';\n      requestAnimationFrame(function () {\n        requestAnimationFrame(function () { card.classList.remove('is-entering'); });\n      });\n    } else {\n      card.style.top    = geom.main.top    + 'px';\n      card.style.left   = geom.main.left   + 'px';\n      card.style.width  = geom.main.width  + 'px';\n      card.style.height = geom.main.height + 'px';\n\n      $explain.style.top    = geom.expl.top    + 'px';\n      $explain.style.left   = geom.expl.left   + 'px';\n      $explain.style.width  = geom.expl.width  + 'px';\n      $explain.style.height = geom.expl.height + 'px';\n\n      // Explanation panel appears with delay (~280ms) per spec\n      setTimeout(function () {\n        $explain.classList.add('is-on');\n        $explain.setAttribute('aria-hidden', 'false');\n        // reset internal scroll\n        var body = $explain.querySelector('.explain__body');\n        if (body) body.scrollTop = 0;\n      }, 280);\n    }\n\n    card.setAttribute('aria-expanded', 'true');\n    var compact = card.querySelector('.card__compact');\n    var full    = card.querySelector('.card__full');\n    if (compact) compact.setAttribute('aria-hidden', 'true');\n    if (full)    full.setAttribute('aria-hidden', 'false');\n\n    document.body.style.overflow = 'hidden';\n\n    // Reset full__body scroll to top\n    var fullBody = card.querySelector('.full__body');\n    if (fullBody) fullBody.scrollTop = 0;\n  }\n\n  function closeCard() {\n    var card = state.activeCard;\n    if (!card) return;\n\n    var isMobile = window.innerWidth <= 768;\n    var placeholder = state.placeholder;\n\n    $explain.classList.remove('is-on');\n    $explain.setAttribute('aria-hidden', 'true');\n\n    if (isMobile) {\n      card.classList.add('is-entering');\n    } else if (placeholder) {\n      var pRect = placeholder.getBoundingClientRect();\n      card.style.top    = pRect.top    + 'px';\n      card.style.left   = pRect.left   + 'px';\n      card.style.width  = pRect.width  + 'px';\n      card.style.height = pRect.height + 'px';\n    }\n\n    setTimeout(function () {\n      $grid.classList.remove('is-focused');\n      $scrim.classList.remove('is-on');\n      $scrim.setAttribute('aria-hidden', 'true');\n    }, 60);\n\n    setTimeout(function () {\n      card.classList.remove('is-active');\n      card.classList.remove('is-entering');\n      card.style.transition = '';\n      card.style.top = card.style.left = card.style.width = card.style.height = '';\n      card.style.willChange = '';\n      card.removeAttribute('aria-expanded');\n\n      var compact = card.querySelector('.card__compact');\n      var full    = card.querySelector('.card__full');\n      if (compact) compact.removeAttribute('aria-hidden');\n      if (full)    full.setAttribute('aria-hidden', 'true');\n\n      if ($explain.parentNode !== document.body) document.body.appendChild($explain);\n      var grab = card.querySelector('.sheet-grab');\n      if (grab && grab.parentNode) grab.parentNode.removeChild(grab);\n\n      if (placeholder && placeholder.parentNode) {\n        placeholder.parentNode.removeChild(placeholder);\n      }\n      state.activeCard = null;\n      state.placeholder = null;\n      document.body.style.overflow = '';\n    }, 440);\n  }\n\n  /* =========================================================\n     Events\n     ========================================================= */\n  $grid.addEventListener('click', function (e) {\n    var card = e.target.closest('.card');\n    if (!card) return;\n    if (state.activeCard) return;\n    var id = card.getAttribute('data-section');\n    if (!SECTIONS[id]) return;\n    openCard(card);\n  });\n\n  $grid.addEventListener('keydown', function (e) {\n    if (e.key !== 'Enter' && e.key !== ' ') return;\n    var card = e.target.closest('.card');\n    if (!card) return;\n    var id = card.getAttribute('data-section');\n    if (!SECTIONS[id]) return;\n    e.preventDefault();\n    openCard(card);\n  });\n\n  $scrim.addEventListener('click', closeCard);\n\n  document.addEventListener('click', function (e) {\n    var btn = e.target.closest('.js-close');\n    if (btn) { e.stopPropagation(); closeCard(); }\n  });\n\n  document.addEventListener('keydown', function (e) {\n    if (e.key === 'Escape' && state.activeCard) closeCard();\n  });\n\n  document.addEventListener('click', function (e) {\n    if (!state.activeCard) return;\n    var card = state.activeCard;\n    if (card.contains(e.target)) return;\n    if ($explain.contains(e.target)) return;\n    if (e.target.closest('.js-close')) return;\n    closeCard();\n  });\n\n  // Recompute geometry on resize while open\n  var resizeRAF = null;\n  window.addEventListener('resize', function () {\n    if (!state.activeCard) return;\n    if (resizeRAF) cancelAnimationFrame(resizeRAF);\n    resizeRAF = requestAnimationFrame(function () {\n      var geom = getTargetGeometry();\n      if (geom.mobile) return;\n      var card = state.activeCard;\n      card.style.top    = geom.main.top    + 'px';\n      card.style.left   = geom.main.left   + 'px';\n      card.style.width  = geom.main.width  + 'px';\n      card.style.height = geom.main.height + 'px';\n      $explain.style.top    = geom.expl.top    + 'px';\n      $explain.style.left   = geom.expl.left   + 'px';\n      $explain.style.width  = geom.expl.width  + 'px';\n      $explain.style.height = geom.expl.height + 'px';\n    });\n  });\n\n  function syncHintForViewport() {\n    var isMobile = window.innerWidth <= 768;\n    var d = document.querySelector('.kbd-desktop');\n    var m = document.querySelector('.kbd-mobile');\n    if (d) d.style.display = isMobile ? 'none' : '';\n    if (m) m.style.display = isMobile ? '' : 'none';\n  }\n  syncHintForViewport();\n  window.addEventListener('resize', syncHintForViewport);\n\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
